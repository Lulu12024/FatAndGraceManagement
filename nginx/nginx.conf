# ─────────────────────────────────────────
# nginx/nginx.conf
# Reverse proxy pour Fate & Grâce
# ─────────────────────────────────────────

upstream django_api {
    server backend:8000;
}

upstream django_ws {
    server daphne:8001;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    # ── Frontend React (SPA) ──────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Nécessaire pour le routing React (SPA)
        try_files $uri $uri/ /index.html;
    }

    # ── API Django REST ───────────────────
    location /api/ {
        proxy_pass http://django_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Admin Django ──────────────────────
    location /admin/ {
        proxy_pass http://django_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── WebSockets (Django Channels) ──────
    location /ws/ {
        proxy_pass http://django_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── Fichiers statiques Django ─────────
    # (admin CSS/JS, Swagger, etc.)
    location /static/ {
        alias /usr/share/nginx/django_static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Fichiers media ────────────────────
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 7d;
    }
}
